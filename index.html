<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>직소 퍼즐 3:4</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0e12; --surface:#18181f; --surface2:#22222c;
    --accent:#f0c040; --text:#f0ede8; --muted:#6b6880;
    --border:#2e2e3a; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;
       min-height:100dvh;display:flex;flex-direction:column;overflow:hidden;overscroll-behavior:none;}

  .screen{display:none;flex-direction:column;flex:1;min-height:0;}
  .screen.active{display:flex;}

  /* ── 설정 화면 ── */
  .setup-wrap{padding:40px 24px;text-align:center;max-width:480px;margin:0 auto;width:100%;}
  .setup-wrap h1{font-family:'Bebas Neue';color:var(--accent);font-size:52px;letter-spacing:3px;margin-bottom:36px;}

  .section-label{font-size:12px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}

  .diff-grid{display:flex;gap:8px;justify-content:center;margin-bottom:32px;}
  .diff-btn{
    flex:1;background:var(--surface2);border:2px solid var(--border);color:var(--muted);
    border-radius:12px;padding:14px 6px;cursor:pointer;font-size:14px;font-weight:600;
    font-family:'Noto Sans KR',sans-serif;line-height:1.5;transition:all .15s;
  }
  .diff-btn span{font-size:10px;font-weight:400;display:block;margin-top:2px;}
  .diff-btn:hover{border-color:var(--accent);color:var(--text);}
  .diff-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(240,192,64,.1);}

  .crop-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;}
  .crop-label{font-size:12px;color:var(--muted);letter-spacing:.08em;}
  .crop-val{
    width:48px;text-align:center;background:var(--surface2);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:7px 4px;font-size:15px;
  }
  .crop-btn{
    width:34px;height:34px;border-radius:50%;background:var(--surface2);
    border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:background .15s;
    flex-shrink:0;
  }
  .crop-btn:hover{background:var(--border);}
  .btn-row{display:flex;flex-direction:column;gap:12px;margin-top:8px;}
  .btn{background:var(--accent);border:none;border-radius:var(--radius);color:#111;
       font-family:'Bebas Neue';font-size:28px;padding:18px;width:100%;cursor:pointer;transition:opacity .2s;}
  .btn:disabled{opacity:0.35;cursor:not-allowed;}
  .btn.secondary{background:var(--surface2);color:var(--muted);font-size:18px;
                  border:1px solid var(--border);}

  /* ── 게임 화면 ── */
  .game-header{
    display:flex;align-items:center;padding:12px 16px;
    background:var(--surface);border-bottom:1px solid var(--border);gap:12px;flex-shrink:0;
  }
  .game-header .back{background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px;}
  .game-stats{display:flex;gap:16px;font-size:13px;color:var(--muted);flex:1;}
  .game-stats b{color:var(--text);font-weight:600;}
  .game-stats .badge{
    font-size:11px;background:var(--surface2);border:1px solid var(--border);
    border-radius:6px;padding:2px 8px;color:var(--muted);
  }
  .btn-shuffle{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px;}

  #puzzle-area{
    flex:1;position:relative;overflow:hidden;touch-action:none;
    display:flex;align-items:center;justify-content:center;min-height:0;
  }
  #grid-root{position:relative;flex-shrink:0;}

  .pgroup{position:absolute;z-index:10;pointer-events:none;touch-action:none;background:transparent;}
  .pgroup.dragging{z-index:500;}

  .piece{position:absolute;overflow:hidden;pointer-events:auto;touch-action:none;cursor:grab;}
  .piece img{display:block;width:100%;height:100%;}

  /* ── 완성 바 (상단 센터 가로형) ── */
  #win-overlay{
    display:none;position:fixed;
    top:16px;
    left:16px;right:16px;       /* 좌우 16px 여백으로 화면 넘침 방지 */
    background:rgba(14,14,18,0.85);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(240,192,64,.45);
    border-radius:40px;padding:10px 16px;
    align-items:center;justify-content:space-between;
    z-index:1000;flex-direction:row;gap:10px;
    box-shadow:0 4px 20px rgba(0,0,0,.35);
    overflow:hidden;
  }
  #win-overlay.show{display:flex;}
  #win-overlay h2{font-family:'Bebas Neue';font-size:22px;color:var(--accent);letter-spacing:1px;line-height:1;margin:0;flex-shrink:0;}
  #win-overlay p{font-size:11px;color:var(--muted);line-height:1.3;margin:0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #win-overlay button{
    background:var(--accent);border:none;border-radius:20px;color:#111;
    font-family:'Bebas Neue';font-size:15px;padding:6px 14px;cursor:pointer;flex-shrink:0;
  }

  #loading{
    position:fixed;inset:0;background:rgba(0,0,0,.8);
    display:none;align-items:center;justify-content:center;z-index:2000;
    color:var(--accent);font-weight:600;font-size:16px;gap:12px;flex-direction:column;
  }
  .spinner{
    width:32px;height:32px;border:3px solid rgba(240,192,64,.2);
    border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- ── 설정 화면 ── -->
<div class="screen active" id="screen-setup">
  <div class="setup-wrap">
    <h1>JIGSAW</h1>

    <div class="section-label">난이도 선택</div>
    <div class="diff-grid">
      <button class="diff-btn active" data-n="4" onclick="setN(this)">4×4<span>16조각</span></button>
      <button class="diff-btn" data-n="5" onclick="setN(this)">5×5<span>25조각</span></button>
      <button class="diff-btn" data-n="6" onclick="setN(this)">6×6<span>36조각</span></button>
      <button class="diff-btn" data-n="7" onclick="setN(this)">7×7<span>49조각</span></button>
    </div>

    <div class="section-label" style="margin-top:0;">경계 크롭 (px)</div>
    <div class="crop-row">
      <button class="crop-btn" onclick="adjCrop(-1)">−</button>
      <input class="crop-val" id="crop-input" type="number" value="2" min="0" max="20" oninput="clampCrop()">
      <button class="crop-btn" onclick="adjCrop(1)">+</button>
      <span class="crop-label" style="margin-left:4px;">단독/그룹 외곽 각 방향</span>
    </div>

    <div class="btn-row">
      <button class="btn" onclick="fetchRandom()">🎲 랜덤 이미지</button>
      <button class="btn" id="btn-start" onclick="startGame()" disabled>퍼즐 시작 →</button>
    </div>
  </div>
</div>

<!-- ── 게임 화면 ── -->
<div class="screen" id="screen-game">
  <div class="game-header">
    <button class="back" onclick="goSetup()">←</button>
    <div class="game-stats">
      <div>이동 <b id="stat-moves">0</b></div>
      <div>시간 <b id="stat-timer">0:00</b></div>
      <span class="badge" id="stat-badge">4×4</span>
    </div>
    <button class="btn-shuffle" onclick="initBoard()" title="재배치">🔀</button>
  </div>
  <div id="puzzle-area"><div id="grid-root"></div><img id="win-img" style="display:none;max-width:100%;max-height:100%;border-radius:6px;touch-action:manipulation;" alt="완성된 퍼즐 — 길게 눌러서 저장"></div>
</div>

<!-- ── 완성 오버레이 ── -->
<div id="win-overlay">
  <h2>🎉 완성!</h2>
  <p id="win-stats"></p><p id="win-hint" style="font-size:11px;color:var(--muted);display:none;">📥 그림을 길게 눌러 저장</p>
  <button onclick="goSetup()">처음으로</button>
</div>

<div id="loading"><div class="spinner"></div>처리 중...</div>

<script>
/* ══════════════════════════════════════════
   상태
   GAP = 0  (고정 — 조각 사이 틈 없음)
   STEP = TILE  (GAP=0이므로 동일)
   grid[r][c] = pid
   groups: Map<gid, {gid, members:[{pid,r,c}]}>
   pieceGroup[pid] = gid
══════════════════════════════════════════ */
const GAP = 0;
let CROP = 2;   // 외곽 각 방향 crop px (단독: 4면, 그룹: 외곽면만)

let N = 4;
let STEP_W, STEP_H, TILE_W, TILE_H;
let grid = [], groups = new Map(), pieceGroup = {};
let nextGid = 0, tiles = [], imgSrc = null;
let moves = 0, seconds = 0, timerInterval = null;

/* ── 설정 ── */
function setN(btn) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  N = parseInt(btn.dataset.n);
}
function adjCrop(d) {
  const inp = document.getElementById('crop-input');
  inp.value = Math.max(0, Math.min(20, parseInt(inp.value || '2') + d));
}
function clampCrop() {
  const inp = document.getElementById('crop-input');
  inp.value = Math.max(0, Math.min(20, parseInt(inp.value || '2')));
}

function showLoading(on) {
  document.getElementById('loading').style.display = on ? 'flex' : 'none';
}

/* ── 이미지 ── */
function fetchRandom() {
  showLoading(true);
  // 2배 해상도로 요청 (1200×1600) — Retina/고해상도 디스플레이 대응
  const id = Math.floor(Math.random() * 1000);
  const url = `https://picsum.photos/seed/${id}/1200/1600`;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const cv = document.createElement('canvas');
    cv.width = 1200; cv.height = 1600;
    cv.getContext('2d').drawImage(img, 0, 0, 1200, 1600);
    imgSrc = cv.toDataURL('image/jpeg', 0.95);
    document.getElementById('btn-start').disabled = false;
    showLoading(false);
  };
  img.onerror = () => {
    showLoading(false);
    alert('이미지를 불러오지 못했습니다. 다시 시도해 주세요.');
  };
  img.src = url;
}

/* ── 게임 시작 ── */
function startGame() {
  CROP = Math.max(0, Math.min(20, parseInt(document.getElementById('crop-input').value || '2')));
  showLoading(true);
  const availW = Math.min(window.innerWidth - 32, 520);
  STEP_W = Math.floor(availW / N);
  STEP_H = Math.floor((availW * 4 / 3) / N);
  TILE_W = STEP_W; // GAP=0
  TILE_H = STEP_H;

  // imgSrc는 이미 canvas data URL — Image로 로드 후 슬라이싱
  // 타일 canvas를 2배 해상도로 생성 (CSS 크기는 TILE_W/H 유지)
  const DPR = 2;
  const img = new Image();
  img.onload = () => {
    tiles = [];
    const srcW = img.width / N, srcH = img.height / N;
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        const tc = document.createElement('canvas');
        tc.width  = TILE_W * DPR;   // 2배 픽셀
        tc.height = TILE_H * DPR;
        tc.getContext('2d').drawImage(
          img,
          c * srcW, r * srcH, srcW, srcH,   // 원본 좌표 (이미 2배 이미지)
          0, 0, TILE_W * DPR, TILE_H * DPR   // 2배 캔버스에 그림
        );
        tiles.push(tc.toDataURL('image/jpeg', 0.92));
      }
    }
    showLoading(false);
    document.getElementById('screen-setup').classList.remove('active');
    document.getElementById('screen-game').classList.add('active');
    document.getElementById('win-overlay').classList.remove('show');
    document.getElementById('stat-badge').textContent = `${N}×${N} · c${CROP}`;
    initBoard();
  };
  img.onerror = () => { showLoading(false); alert('오류가 발생했습니다.'); };
  img.src = imgSrc;
}

function goSetup() {
  clearInterval(timerInterval);
  document.getElementById('screen-game').classList.remove('active');
  document.getElementById('screen-setup').classList.add('active');
  document.getElementById('win-overlay').classList.remove('show');
  // 상태 초기화
  document.getElementById('win-img').style.display = 'none';
  document.getElementById('win-hint').style.display = 'none';
  document.getElementById('grid-root').style.display = '';
}

/* ── 보드 초기화 ── */
function initBoard() {
  moves = 0; groups.clear(); pieceGroup = {}; nextGid = 0;
  document.getElementById('stat-moves').textContent = 0;
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('win-img').style.display = 'none';
  document.getElementById('win-hint').style.display = 'none';
  document.getElementById('grid-root').style.display = '';
  startTimer();

  const root = document.getElementById('grid-root');
  root.style.width  = (N * STEP_W) + 'px';
  root.style.height = (N * STEP_H) + 'px';

  const pids = Array.from({length: N * N}, (_, i) => i).sort(() => Math.random() - 0.5);
  grid = Array.from({length: N}, () => Array(N).fill(-1));

  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      const pid = pids[r * N + c];
      grid[r][c] = pid;
      const gid = nextGid++;
      groups.set(gid, { gid, members: [{ pid, r, c }] });
      pieceGroup[pid] = gid;
    }
  }
  // 시작 시 이미 올바르게 인접한 조각은 즉시 병합
  runMergePass();
  renderAll();
}

/* ══════════════════════════════════════════
   렌더링
   CROP: 외곽 각 방향 잘라낼 픽셀 수
   - 단독: 4면 모두 CROP
   - 그룹: 인접 멤버 없는 방향만 CROP

   구현: piece div 크기를 crop만큼 줄이고
   img를 object-fit:none + object-position으로
   원본 이미지의 해당 영역만 표시
   → pgroup overflow와 무관하게 정확히 동작
══════════════════════════════════════════ */
function renderAll() {
  const root = document.getElementById('grid-root');
  root.innerHTML = '';

  // 그룹별 멤버 위치 조회 Set
  const mbrSet = new Set();
  groups.forEach(g => g.members.forEach(m => mbrSet.add(g.gid + ',' + m.r + ',' + m.c)));

  groups.forEach(g => {
    const minR = Math.min(...g.members.map(m => m.r));
    const minC = Math.min(...g.members.map(m => m.c));
    const maxR = Math.max(...g.members.map(m => m.r));
    const maxC = Math.max(...g.members.map(m => m.c));

    const el = document.createElement('div');
    el.className = 'pgroup';
    el.id = `group-${g.gid}`;
    el.style.left   = (minC * STEP_W) + 'px';
    el.style.top    = (minR * STEP_H) + 'px';
    el.style.width  = ((maxC - minC) * STEP_W + TILE_W) + 'px';
    el.style.height = ((maxR - minR) * STEP_H + TILE_H) + 'px';

    g.members.forEach(m => {
      // 인접 멤버 여부 (상하좌우)
      // 규칙: 같은 그룹 멤버가 있는 방향 → crop 0 (내부면)
      //       멤버 없는 방향 → crop CROP (외부 노출면)
      const hasT = mbrSet.has(g.gid + ',' + (m.r-1) + ',' + m.c);
      const hasB = mbrSet.has(g.gid + ',' + (m.r+1) + ',' + m.c);
      const hasL = mbrSet.has(g.gid + ',' + m.r + ',' + (m.c-1));
      const hasR = mbrSet.has(g.gid + ',' + m.r + ',' + (m.c+1));

      const cT = hasT ? 0 : CROP;
      const cB = hasB ? 0 : CROP;
      const cL = hasL ? 0 : CROP;
      const cR = hasR ? 0 : CROP;

      // piece 크기 = TILE - crop (crop된 만큼 작아짐 → 갭 생성)
      const pw = TILE_W - cL - cR;
      const ph = TILE_H - cT - cB;

      const piece = document.createElement('div');
      piece.className = 'piece';
      piece.style.width  = pw + 'px';
      piece.style.height = ph + 'px';
      // piece 위치: 원래 위치에서 crop(cL, cT)만큼 안쪽으로
      piece.style.left   = ((m.c - minC) * STEP_W + cL) + 'px';
      piece.style.top    = ((m.r - minR) * STEP_H + cT) + 'px';

      // background-image 방식:
      // background-size = TILE_W × TILE_H (CSS 1배 크기로 2배 픽셀 표시 → 선명)
      // background-position = (-cL, -cT) → crop 위치 정확
      // piece div overflow:hidden이 pw×ph로 클리핑
      piece.style.backgroundImage    = `url(${tiles[m.pid]})`;
      piece.style.backgroundSize     = TILE_W + 'px ' + TILE_H + 'px';
      piece.style.backgroundPosition = (-cL) + 'px ' + (-cT) + 'px';
      piece.style.backgroundRepeat   = 'no-repeat';

      piece.addEventListener('pointerdown', onDown);
      el.appendChild(piece);
    });

    root.appendChild(el);
  });
}

/* ── 드래그 ── */
let drag = { gid: -1, startX: 0, startY: 0, origL: 0, origT: 0, groupEl: null };

function onDown(e) {
  e.preventDefault();
  const pieceEl = e.currentTarget;
  const groupEl = pieceEl.closest('.pgroup');
  if (!groupEl) return;
  const gid = parseInt(groupEl.id.split('-')[1]);
  const g = groups.get(gid);
  if (!g) return;

  drag = { gid, startX: e.clientX, startY: e.clientY,
           origL: parseFloat(groupEl.style.left), origT: parseFloat(groupEl.style.top),
           groupEl };

  groupEl.classList.add('dragging');
  groupEl.parentNode.appendChild(groupEl);

  // capture를 piece에 걸어야 PC/모바일 모두 pointermove 발화
  // move/up 이벤트는 document에서 받아 groupEl을 직접 이동
  pieceEl.setPointerCapture(e.pointerId);
  pieceEl.addEventListener('pointermove', onMove);
  pieceEl.addEventListener('pointerup', onUp);
  pieceEl.addEventListener('pointercancel', onUp);
}

function onMove(e) {
  const { groupEl, origL, origT, startX, startY } = drag;
  if (!groupEl) return;
  groupEl.style.left = (origL + e.clientX - startX) + 'px';
  groupEl.style.top  = (origT + e.clientY - startY) + 'px';
}

function onUp(e) {
  const pieceEl = e.currentTarget;
  pieceEl.removeEventListener('pointermove', onMove);
  pieceEl.removeEventListener('pointerup', onUp);
  pieceEl.removeEventListener('pointercancel', onUp);

  const { groupEl } = drag;
  if (!groupEl) return;
  groupEl.classList.remove('dragging');

  const g = groups.get(drag.gid);
  const minR = Math.min(...g.members.map(m => m.r));
  const minC = Math.min(...g.members.map(m => m.c));
  const maxR = Math.max(...g.members.map(m => m.r));
  const maxC = Math.max(...g.members.map(m => m.c));
  const spanR = maxR - minR, spanC = maxC - minC;

  // GAP=0: 컨테이너 left = minC * STEP_W
  let nC = Math.round(parseFloat(groupEl.style.left) / STEP_W);
  let nR = Math.round(parseFloat(groupEl.style.top)  / STEP_H);
  nC = Math.max(0, Math.min(N - 1 - spanC, nC));
  nR = Math.max(0, Math.min(N - 1 - spanR, nR));

  if (nC !== minC || nR !== minR) {
    swapAndMove(drag.gid, nR - minR, nC - minC);
    moves++;
    document.getElementById('stat-moves').textContent = moves;
    runMergePass();
    renderAll();
    checkWin();
  } else {
    groupEl.style.left = (minC * STEP_W) + 'px';
    groupEl.style.top  = (minR * STEP_H) + 'px';
  }
}

/* ══════════════════════════════════════════
   이동 로직
   1. 이동 그룹 구 위치 grid 비움
   2. 새 위치의 타 pid 수집 & grid 비움
   3. 이동 그룹 새 위치 확정
   4. 밀려난 pid를 빈 칸에 배치 (즉시 grid 기록)
══════════════════════════════════════════ */
function swapAndMove(gid, dR, dC) {
  const g = groups.get(gid);

  // 1. 구 위치 grid 비움
  const oldCells = g.members.map(m => ({ r: m.r, c: m.c }));
  oldCells.forEach(({ r, c }) => { grid[r][c] = -1; });

  // 2. 새 위치 타 pid 수집
  const myPids = new Set(g.members.map(m => m.pid));
  const displaced = [];
  g.members.forEach(m => {
    const nr = m.r + dR, nc = m.c + dC;
    if (nr < 0 || nr >= N || nc < 0 || nc >= N) return;
    const pid = grid[nr][nc];
    if (pid === -1 || myPids.has(pid)) return;
    displaced.push(pid);
    grid[nr][nc] = -1;
  });

  // 3. 이동 그룹 새 위치 확정
  g.members.forEach(m => {
    m.r += dR; m.c += dC;
    grid[m.r][m.c] = m.pid;
  });

  // 4. 밀려난 pid 배치
  const freeSlots = oldCells.filter(({ r, c }) => grid[r][c] === -1);

  displaced.forEach(pid => {
    // 그룹에서 분리
    const cgid = pieceGroup[pid];
    const cg = groups.get(cgid);
    if (cg) {
      cg.members = cg.members.filter(m => m.pid !== pid);
      if (cg.members.length === 0) groups.delete(cgid);
    }

    // 빈 슬롯 찾기 (구 위치 우선, 그 다음 전체 탐색)
    let slot = freeSlots.shift() || null;
    if (!slot) {
      for (let r = 0; r < N && !slot; r++)
        for (let c = 0; c < N && !slot; c++)
          if (grid[r][c] === -1) slot = { r, c };
    }
    if (!slot) return;

    grid[slot.r][slot.c] = pid;
    const ngid = nextGid++;
    groups.set(ngid, { gid: ngid, members: [{ pid, r: slot.r, c: slot.c }] });
    pieceGroup[pid] = ngid;
  });
}

/* ── 병합 ── */
function runMergePass() {
  let changed = true;
  while (changed) {
    changed = false;
    for (let [gid] of groups) {
      if (tryMerge(gid)) { changed = true; break; }
    }
  }
}

function tryMerge(gid) {
  const g = groups.get(gid);
  if (!g) return false;
  for (const m of g.members) {
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = m.r + dr, nc = m.c + dc;
      if (nr < 0 || nr >= N || nc < 0 || nc >= N) continue;
      const nPid = grid[nr][nc];
      if (nPid === -1 || pieceGroup[nPid] === gid) continue;
      if (Math.floor(nPid / N) - Math.floor(m.pid / N) === dr &&
          (nPid % N) - (m.pid % N) === dc) {
        merge(gid, pieceGroup[nPid]);
        return true;
      }
    }
  }
  return false;
}

function merge(gidA, gidB) {
  const gA = groups.get(gidA), gB = groups.get(gidB);
  if (!gA || !gB) return;
  gB.members.forEach(m => { gA.members.push(m); pieceGroup[m.pid] = gidA; });
  groups.delete(gidB);
}

/* ── 승리 ── */
function checkWin() {
  if (groups.size !== 1) return;
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      if (grid[r][c] !== r * N + c) return;

  clearInterval(timerInterval);
  const t = document.getElementById('stat-timer').textContent;
  document.getElementById('win-stats').textContent = `이동 ${moves}회 · 시간 ${t}`;

  // 완성 퍼즐 이미지 표시: grid-root 숨기고 원본 이미지로 교체
  // → 롱프레스로 저장 가능
  const winImg = document.getElementById('win-img');
  winImg.src = imgSrc;  // fetchRandom에서 저장한 고해상도 data URL
  winImg.style.display = 'block';
  document.getElementById('grid-root').style.display = 'none';
  document.getElementById('win-hint').style.display = 'block';

  setTimeout(() => document.getElementById('win-overlay').classList.add('show'), 200);
}

/* ── 타이머 ── */
function startTimer() {
  clearInterval(timerInterval);
  seconds = 0;
  document.getElementById('stat-timer').textContent = '0:00';
  timerInterval = setInterval(() => {
    seconds++;
    const m = Math.floor(seconds / 60), s = seconds % 60;
    document.getElementById('stat-timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
  }, 1000);
}
</script>
